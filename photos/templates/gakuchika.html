{% extends 'photos/base.html' %}

{% block content %}
<div class="container py-5">
    <h2 class="mb-5 fw-bold text-center" style="letter-spacing: 0.2rem;">STUDENT ACTIVITIES</h2>
    
    <div class="row">
        {% for item in gakuchika_list %}
        <div class="col-md-6 mb-4">
            <div class="card h-100 shadow-sm border-0" style="border-radius: 15px;">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <span class="badge bg-dark px-3 py-2" style="border-radius: 50px;">{{ item.category }}</span>
                        <small class="text-muted">{{ item.period }}</small>
                    </div>
                    <h4 class="card-title fw-bold mb-3">{{ item.title }}</h4>
                    <p class="card-text text-secondary" style="line-height: 1.8;">{{ item.content|linebreaksbr }}</p>
                    {% if item.result %}
                    <div class="mt-3 p-3 bg-light" style="border-left: 4px solid #1a1a1a; border-radius: 4px;">
                        <small class="fw-bold d-block mb-1">【成果・学び】</small>
                        <p class="small text-muted mb-0">{{ item.result }}</p>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
