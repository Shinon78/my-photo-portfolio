    <style>
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #f4f5f7;
            color: #333;
        }

        /* --- サイドバーの基本設定（スマホ時は上に配置） --- */
        #sidebar {
            background-color: #1a1a1a;
            color: white;
            display: flex;
            flex-direction: column;
            z-index: 1040;
        }

        /* --- コンテンツの基本設定（スマホ時はサイドバーの下に配置） --- */
        #content {
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* --- PC用のレイアウト（画面幅768px以上の場合のみ適用） --- */
        @media (min-width: 768px) {
            #sidebar {
                min-width: 280px;
                max-width: 280px;
                min-height: 100vh;
                position: fixed; /* 左側にガッチリ固定 */
            }
            #content {
                margin-left: 280px; /* サイドバーの幅の分だけ右にずらす */
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .nav-link {
            color: #bbb;
            transition: all 0.3s;
            padding: 10px 20px;
            letter-spacing: 0.1rem;
        }
