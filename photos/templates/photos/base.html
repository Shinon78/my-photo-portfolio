    <style>
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #f4f5f7;
            color: #333;
        }

        /* --- サイドバー/Offcanvasの基本設定 --- */
        #sidebarOffcanvas {
            background-color: #1a1a1a;
            color: white;
            z-index: 1040;
            border: none;
        }

        /* --- コンテンツの基本設定 --- */
        #content {
            width: 100%;
            padding: 40px;
            animation: fadeIn 0.8s ease-in-out;
        }

        /* --- PC用のレイアウト（768px以上） --- */
        @media (min-width: 768px) {
            #sidebarOffcanvas {
                min-width: 280px;
                max-width: 280px;
                min-height: 100vh;
                position: fixed; /* 左側に固定 */
                /* BootstrapのOffcanvas機能をPCでは無効化して表示し続ける設定 */
                transform: none !important;
                visibility: visible !important;
            }
            #content {
                margin-left: 280px; /* サイドバーの幅分だけ余白を作る */
            }
        }

        /* スマホ用ヘッダーの微調整 */
        .mobile-header {
            background-color: #1a1a1a;
            border-bottom: 1px solid #333;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

            color: #bbb;
            transition: all 0.3s;
            padding: 10px 20px;
            letter-spacing: 0.1rem;
