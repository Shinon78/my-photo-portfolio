<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="wcIDpoP8F-rLxn7nFptL0_Xy5NGEX-oveh8G0Zx6Dzs" />
    <meta name="description" content="工学部大学生が自作。Nikon D3100で撮影した風景や日常を記録したフォトポートフォリオ">
    <title>Shinon's Photo Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #f4f5f7;
            color: #333;
        }

        #sidebar {
            min-width: 280px;
            max-width: 280px;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: white;
            position: fixed;
            display: flex;
            flex-direction: column;
        }

        #content {
            width: 100%;
            padding: 40px;
            margin-left: 280px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .nav-link {
            color: #bbb;
            transition: all 0.3s;
            padding: 10px 20px;
            letter-spacing: 0.1rem;
        }

        .nav-link:hover {
            color: white;
            background-color: #333;
            padding-left: 30px;
        }

        .profile-title {
            display: inline-block;
            border-bottom: 3px double white;
            padding-bottom: 4px;
            margin-bottom: 30px;
            letter-spacing: 0.2rem;
            font-size: 0.85rem;
            color: #fff;
        }

        .site-description {
            font-size: 0.75rem;
            color: #aaa;
            line-height: 1.6;
            margin-top: 15px;
            padding: 0 10px;
            text-align: left;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-bottom: 20px;
            color: #777;
            font-size: 0.75rem;
            line-height: 1.6;
        }

        /* プレローダー */
        #loader {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            background: #1a1a1a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loaded {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p>Now Loading...</p>
    </div>
    
    <script>
        window.addEventListener('load', function() {
            const loader = document.getElementById('loader');
            loader.classList.add('loaded');
        });
    </script>

    <div class="d-flex">
        <nav id="sidebar" class="p-4 text-center">
            <h4 class="mb-5 mt-3 fw-bold" style="letter-spacing: 0.1rem;">Shinon's Photo Portfolio</h4>
            
            <div class="mt-4">
                <span class="profile-title">PROFILE</span>
            </div>

            <h5 class="mb-1 fw-bold">Shinon</h5>
            <p class="small mb-2" style="color: #888; letter-spacing: 0.05rem;">Engineer & Photographer</p>
            
            <div class="site-description">
                <p>工学部大学生が自らWebページを構築。愛機 Nikon D3100 で切り取った景色を投稿しています。</p>
            </div>

            <ul class="nav flex-column text-start mt-5">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'photos:index' %}">GALLERY</a>
                </li>
            
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'photos:post_list' %}">BLOG</a>
                </li>
            
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'photos:about' %}">ABOUT ME</a>
                </li>
            </ul>

            <div class="sidebar-footer">
                <p>
                    &copy; 2026 Shinon<br>
                    All rights reserved.<br>
                    当サイト内の文章・画像の<br>無断転載禁止
                </p>
            </div>
        </nav>

        <div id="content">
            {% block content %}
            {% endblock %}
        </div>
    </div>

</body>
</html>
