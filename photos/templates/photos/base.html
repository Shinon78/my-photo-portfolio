<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="google-site-verification" content="wcIDpoP8F-rLxn7nFptL0_Xy5NGEX-oveh8G0Zx6Dzs" />
    <meta name="description" content="Nikon D3100で撮影した風景や日常を記録したフォトポートフォリオ">
    <title>Shinon's Photo Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Serif JP', serif;
            background-color: #f4f5f7;
            color: #333;
        }

        /* サイドバーの設定 */
        #sidebar {
            min-width: 280px;
            max-width: 280px;
            min-height: 100vh;
            background-color: #1a1a1a;
            color: white;
            position: fixed;
            transition: all 0.3s;
        }

        /* メインコンテンツの設定 */
        #content {
            width: 100%;
            padding: 40px;
            margin-left: 280px;
            animation: fadeIn 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* ナビゲーションリンク */
        .nav-link {
            color: #bbb;
            transition: all 0.3s;
            padding: 10px 20px;
            letter-spacing: 0.1rem;
        }

        .nav-link:hover {
            color: white;
            background-color: #333;
            padding-left: 30px;
        }

        /* プロフィール見出しの2重線スタイル */
        .profile-title {
            display: inline-block;
            border-bottom: 3px double white; /* 白い2重線 */
            padding-bottom: 4px;
            margin-bottom: 30px; /* 下の名前との間隔を少し広げました */
            letter-spacing: 0.2rem;
            font-size: 0.85rem;
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="d-flex">
        <nav id="sidebar" class="p-4 text-center">
            <h4 class="mb-5 mt-3 fw-bold" style="letter-spacing: 0.1rem;">My Photo Portfolio</h4>
            
            <div class="mt-4">
                <span class="profile-title">PROFILE</span>
            </div>

            <h5 class="mb-1 fw-bold">Shinon</h5>
            <p class="small mb-5" style="color: #888; letter-spacing: 0.05rem;">Engineer & Photographer</p>

            <ul class="nav flex-column text-start mt-5">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'photos:index' %}">GALLERY</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'photos:about' %}">ABOUT ME</a>
                </li>
            </ul>
        </nav>

        <div id="content">
            {% block content %}
            {% endblock %}
        </div>
    </div>

</body>
</html>
