{% extends "photos/base.html" %}
{% block content %}
<div class="container" style="max-width: 800px;">
    <p class="text-muted">{{ post.created_at|date:"Y.m.d" }}</p>
    <h1 class="mb-5 fw-bold">{{ post.title }}</h1>
    
    {% if post.image %}
    <div class="mb-5 text-center">
        <img src="{{ post.image.url }}" class="img-fluid rounded shadow-sm">
    </div>
    {% endif %}

    <div style="line-height: 2; letter-spacing: 0.05rem; white-space: pre-wrap;">
        {{ post.content }}
    </div>

    <div class="mt-5 pt-5 border-top">
        <a href="{% url 'photos:post_list' %}" class="btn btn-dark">BACK TO LIST</a>
    </div>
</div>
{% endblock %}
