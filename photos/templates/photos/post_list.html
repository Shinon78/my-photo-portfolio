{% extends "photos/base.html" %}

{% block content %}
<div class="container">
    <h2 class="mb-5 fw-bold" style="letter-spacing: 0.1rem;">BLOG</h2>
    
    <div class="row">
        {% for post in posts %}
        <div class="col-md-6 col-lg-4 mb-5">
            <div class="card border-0 shadow-sm h-100 custom-hover-card">
                
                <div style="overflow: hidden; border-top-left-radius: 8px; border-top-right-radius: 8px;">
                    {% if post.image %}
                        <img src="{{ post.image.url }}" class="card-img-top" alt="{{ post.title }}" style="height: 220px; object-fit: cover; border-radius: 0;">
                    {% else %}
                        <div class="card-img-top bg-light d-flex align-items-center justify-content-center" style="height: 220px; color: #aaa; border-radius: 0;">
                            <span class="small" style="letter-spacing: 0.1rem;">NO IMAGE</span>
                        </div>
                    {% endif %}
                </div>

                <div class="card-body p-4 d-flex flex-column">
                    <h4 class="fw-bold mb-2" style="font-size: 1.1rem;">{{ post.title }}</h4>
                    <p class="text-muted small mb-3">{{ post.created_at|date:"Y.m.d" }}</p>
                    
                    <p class="text-secondary mb-4" style="font-size: 0.9rem;">{{ post.content|striptags|truncatechars:60 }}</p>
                    
                    <div class="mt-auto">
                        <a href="{% url 'photos:post_detail' post.pk %}" class="btn btn-outline-dark btn-sm rounded-pill" style="padding: 0.4rem 1.5rem;">READ MORE</a>
                    </div>
                </div>
            </div>
        </div>
        
        {% empty %}
        <div class="col-12 text-center text-muted py-5">
            <p>まだブログ記事がありません。</p>
        </div>
        {% endfor %}
    </div>

    {%
