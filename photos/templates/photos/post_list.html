{% extends "photos/base.html" %}
{% block content %}
<div class="container">
    <h2 class="mb-5 fw-bold" style="letter-spacing: 0.1rem;">BLOG</h2>
    <div class="row">
        {% for post in posts %}
        <div class="col-md-12 mb-4">
            <div class="card border-0 shadow-sm p-4">
                <h3 class="fw-bold">{{ post.title }}</h3>
                <p class="text-muted small">{{ post.created_at|date:"Y.m.d" }}</p>
                <p>{{ post.content|truncatewords:40 }}</p>
                <a href="{% url 'photos:post_detail' post.pk %}" class="btn btn-outline-dark btn-sm" style="width: fit-content;">READ MORE</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
